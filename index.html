<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trésorerie · Lumiia</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0d0f14; --surface: #13161d; --surface2: #1a1e28;
      --border: rgba(255,255,255,0.07); --accent: #4ade80;
      --danger: #f87171; --warn: #fbbf24; --info: #60a5fa;
      --text: #e8eaf0; --muted: #6b7280; --muted2: #9ca3af;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:var(--bg); color:var(--text); font-family:'DM Sans',sans-serif; font-size:14px; min-height:100vh; }
    #loginScreen { display:flex; align-items:center; justify-content:center; min-height:100vh; padding:20px; }
    .login-card { background:var(--surface); border:1px solid var(--border); border-radius:20px; padding:40px; width:100%; max-width:400px; }
    .login-logo { font-family:'DM Serif Display',serif; font-size:24px; margin-bottom:8px; }
    .login-logo span { color:var(--accent); }
    .login-subtitle { font-size:13px; color:var(--muted2); margin-bottom:32px; }
    .login-field { margin-bottom:16px; }
    .login-field label { display:block; font-size:12px; color:var(--muted2); font-weight:500; letter-spacing:.5px; text-transform:uppercase; margin-bottom:8px; }
    .login-field input { width:100%; background:var(--surface2); border:1px solid var(--border); border-radius:10px; padding:12px 16px; color:var(--text); font-family:'DM Sans',sans-serif; font-size:14px; outline:none; transition:border-color .2s; }
    .login-field input:focus { border-color:rgba(74,222,128,0.4); }
    .login-btn { width:100%; background:var(--accent); color:#0d0f14; border:none; border-radius:10px; padding:13px; font-family:'DM Sans',sans-serif; font-size:14px; font-weight:600; cursor:pointer; margin-top:8px; transition:opacity .2s; }
    .login-btn:hover { opacity:.9; }
    .login-btn:disabled { opacity:.5; cursor:not-allowed; }
    .login-error { margin-top:14px; padding:10px 14px; background:rgba(248,113,113,0.08); border:1px solid rgba(248,113,113,0.2); border-radius:8px; font-size:13px; color:var(--danger); display:none; }
    #app { display:none; }
    .header { display:flex; align-items:center; justify-content:space-between; padding:16px 32px 12px; border-bottom:1px solid var(--border); background:var(--surface); }
    .header-left { display:flex; flex-direction:column; gap:2px; }
    .logo { font-family:'DM Serif Display',serif; font-size:20px; }
    .logo span { color:var(--accent); }
    .header-version { font-size:0.72rem; color:var(--muted2); font-weight:600; letter-spacing:0.06em; }
    .header-right { display:flex; align-items:center; gap:16px; }
    .badge { font-size:11px; padding:4px 10px; border-radius:20px; }
    .badge.loading { color:var(--muted2); background:rgba(255,255,255,0.04); border:1px solid var(--border); }
    .badge.ok { color:var(--accent); background:rgba(74,222,128,0.1); border:1px solid rgba(74,222,128,0.2); }
    .badge.err { color:var(--danger); background:rgba(248,113,113,0.08); border:1px solid rgba(248,113,113,0.2); }
    .logout-btn { background:transparent; border:1px solid var(--border); border-radius:8px; color:var(--muted2); font-family:'DM Sans',sans-serif; font-size:12px; padding:5px 12px; cursor:pointer; transition:all .15s; }
    .logout-btn:hover { color:var(--text); border-color:rgba(255,255,255,0.2); }
    .alerts { padding:16px 32px 0; display:flex; flex-direction:column; gap:8px; }
    .alert { display:flex; align-items:flex-start; gap:12px; padding:12px 16px; border-radius:10px; font-size:13px; animation:fadeIn .3s ease; }
    .alert.danger { background:rgba(248,113,113,0.08); border:1px solid rgba(248,113,113,0.2); }
    .alert strong { display:block; font-weight:600; margin-bottom:2px; }
    .alert span { color:var(--muted2); font-size:12px; }
    .content { padding:24px 32px 40px; }
    .kpis { display:grid; grid-template-columns:repeat(3,1fr); gap:16px; margin-bottom:24px; }
    .kpi { background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:20px; position:relative; overflow:hidden; transition:transform .2s; }
    .kpi:hover { transform:translateY(-2px); }
    .kpi-label { font-size:11px; color:var(--muted2); text-transform:uppercase; letter-spacing:.8px; font-weight:500; margin-bottom:10px; }
    .kpi-value { font-family:'DM Serif Display',serif; font-size:30px; letter-spacing:-1px; line-height:1; }
    .kpi-sub { font-size:12px; margin-top:8px; color:var(--muted2); }
    .kpi-bar { position:absolute; bottom:0; left:0; right:0; height:3px; border-radius:0 0 14px 14px; }
    .skeleton { background:var(--surface2); border-radius:6px; height:32px; width:120px; animation:pulse 1.5s infinite; }
    .grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
    .card { background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:22px; }
    .card-title { font-size:14px; font-weight:500; margin-bottom:4px; }
    .card-sub { font-size:12px; color:var(--muted2); margin-bottom:18px; }
    .flux-list { display:flex; flex-direction:column; }
    .flux-item { display:flex; align-items:center; justify-content:space-between; padding:11px 0; border-bottom:1px solid var(--border); }
    .flux-item:last-child { border-bottom:none; }
    .flux-left { display:flex; align-items:center; gap:11px; }
    .flux-icon { width:32px; height:32px; border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:14px; flex-shrink:0; }
    .flux-name { font-size:13px; font-weight:500; }
    .flux-date { font-size:11.5px; color:var(--muted2); margin-top:1px; }
    .flux-amount { font-size:13.5px; font-weight:600; }
    .positive { color:var(--accent); }
    .negative { color:var(--danger); }
    .late-color { color:var(--warn); }
    .tag { display:inline-block; font-size:10.5px; padding:2px 8px; border-radius:4px; font-weight:600; text-transform:uppercase; letter-spacing:.5px; margin-left:6px; }
    .tag-late { background:rgba(248,113,113,0.12); color:var(--danger); }
    .tag-ok { background:rgba(74,222,128,0.1); color:var(--accent); }
    .tag-soon { background:rgba(251,191,36,0.12); color:var(--warn); }
    .tag-prev { background:rgba(96,165,250,0.1); color:var(--info); }
    .qbubble { background:linear-gradient(135deg,rgba(74,222,128,.07),rgba(96,165,250,.04)); border:1px solid rgba(74,222,128,.18); border-radius:14px; padding:16px 18px; margin-top:16px; display:flex; align-items:flex-start; gap:14px; animation:fadeIn .4s ease; }
    .qb-icon { width:38px; height:38px; background:rgba(74,222,128,.1); border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:17px; flex-shrink:0; }
    .qb-text p { font-size:13.5px; line-height:1.5; }
    .qb-text strong { color:var(--accent); }
    .qb-actions { display:flex; gap:8px; margin-top:10px; flex-wrap:wrap; }
    .qb-btn { padding:6px 13px; border-radius:7px; font-size:12px; cursor:pointer; font-family:'DM Sans',sans-serif; font-weight:500; transition:all .15s; }
    .qb-yes { background:var(--accent); color:#0d0f14; border:none; }
    .qb-no { background:transparent; color:var(--muted2); border:1px solid var(--border); }
    .empty { color:var(--muted2); font-size:13px; padding:12px 0; text-align:center; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }
    @keyframes fadeIn { from{opacity:0;transform:translateY(-6px)} to{opacity:1;transform:translateY(0)} }
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-card">
    <div class="login-logo">Lumiia <span>&middot;</span> Tr&eacute;sorerie</div>
    <div class="login-subtitle">Connectez-vous pour acc&eacute;der au tableau de bord</div>
    <div class="login-field">
      <label>Adresse e-mail</label>
      <input type="email" id="loginEmail" placeholder="contact@lumiia.fr" autocomplete="email">
    </div>
    <div class="login-field">
      <label>Mot de passe</label>
      <input type="password" id="loginPassword" placeholder="&bull;&bull;&bull;&bull;&bull;&bull;&bull;&bull;" autocomplete="current-password">
    </div>
    <button class="login-btn" id="loginBtn">Se connecter</button>
    <div class="login-error" id="loginError"></div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="header">
    <div class="header-left">
      <div class="logo">Lumiia <span>&middot;</span> Tr&eacute;sorerie</div>
      <div class="header-version">v1.4</div>
    </div>
    <div class="header-right">
      <div class="badge loading" id="syncBadge">&#9203; Chargement&hellip;</div>
      <div style="font-size:12px;color:var(--muted2)" id="headerDate"></div>
      <button class="logout-btn" id="logoutBtn">D&eacute;connexion</button>
    </div>
  </div>
  <div class="alerts" id="alertsZone"></div>
  <div class="content">
    <div class="kpis">
      <div class="kpi" id="kpi1">
        <div class="kpi-label">Factures clients en cours</div>
        <div class="skeleton"></div>
        <div class="kpi-bar" style="background:var(--accent);opacity:.3"></div>
      </div>
      <div class="kpi" id="kpi2">
        <div class="kpi-label">Factures en retard</div>
        <div class="skeleton"></div>
        <div class="kpi-bar" style="background:var(--danger);opacity:.3"></div>
      </div>
      <div class="kpi" id="kpi3">
        <div class="kpi-label">Charges fournisseurs (30j)</div>
        <div class="skeleton"></div>
        <div class="kpi-bar" style="background:var(--warn);opacity:.3"></div>
      </div>
    </div>
    <div class="grid">
      <div class="card">
        <div class="card-title">Factures clients</div>
        <div class="card-sub" id="invSub">Chargement&hellip;</div>
        <div class="flux-list" id="invList"><div class="empty">&#9203;</div></div>
      </div>
      <div class="card">
        <div class="card-title">Charges fournisseurs r&eacute;centes</div>
        <div class="card-sub" id="supSub">Chargement&hellip;</div>
        <div class="flux-list" id="supList"><div class="empty">&#9203;</div></div>
      </div>
    </div>
    <div id="questionZone"></div>
  </div>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';

const firebaseConfig = {
  apiKey: 'AIzaSyBPgjVFKrP80qX_hlfUFqL168XONfNIBA4',
  authDomain: 'lumiia-live.firebaseapp.com',
  projectId: 'lumiia-live',
  databaseURL: 'https://lumiia-live-default-rtdb.europe-west1.firebasedatabase.app'
};
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const PROXY_URL = 'https://europe-west1-lumiia-live.cloudfunctions.net/pennylane';

function fmt(n) { return new Intl.NumberFormat('fr-FR',{style:'currency',currency:'EUR',maximumFractionDigits:0}).format(parseFloat(n)); }
function daysFrom(d) { return Math.floor((new Date()-new Date(d))/86400000); }
function daysUntil(d) { return Math.ceil((new Date(d)-new Date())/86400000); }
function shortDate(d) { return new Date(d).toLocaleDateString('fr-FR',{day:'numeric',month:'short'}); }
function statusTag(inv) {
  if (inv.status==='late') return `<span class="tag tag-late">Retard \u00b7 ${daysFrom(inv.deadline)}j</span>`;
  if (inv.status==='paid') return `<span class="tag tag-ok">Pay\u00e9e</span>`;
  const d=daysUntil(inv.deadline);
  if (d<=7) return `<span class="tag tag-soon">\u00c9ch. dans ${d}j</span>`;
  return `<span class="tag tag-prev">\u00c9ch. ${shortDate(inv.deadline)}</span>`;
}

document.getElementById('headerDate').textContent = new Date().toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long',year:'numeric'});

const loginScreen = document.getElementById('loginScreen');
const appDiv = document.getElementById('app');
const loginBtn = document.getElementById('loginBtn');
const loginError = document.getElementById('loginError');

onAuthStateChanged(auth, (user) => {
  if (user) { loginScreen.style.display='none'; appDiv.style.display='block'; load(); }
  else { loginScreen.style.display='flex'; appDiv.style.display='none'; }
});

loginBtn.addEventListener('click', async () => {
  const email = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPassword').value;
  loginError.style.display = 'none';
  loginBtn.disabled = true;
  loginBtn.textContent = 'Connexion\u2026';
  try {
    await signInWithEmailAndPassword(auth, email, password);
  } catch(e) {
    loginError.textContent = 'Email ou mot de passe incorrect';
    loginError.style.display = 'block';
    loginBtn.disabled = false;
    loginBtn.textContent = 'Se connecter';
  }
});
document.getElementById('loginEmail').addEventListener('keydown', (e) => { if (e.key==='Enter') loginBtn.click(); });
document.getElementById('loginPassword').addEventListener('keydown', (e) => { if (e.key==='Enter') loginBtn.click(); });
document.getElementById('logoutBtn').addEventListener('click', () => signOut(auth));

async function load() {
  try {
    const idToken = await auth.currentUser.getIdToken();
    const headers = { 'Authorization': `Bearer ${idToken}` };
    const [invRes, supRes] = await Promise.all([
      fetch(`${PROXY_URL}/customer_invoices?limit=10`, { headers }),
      fetch(`${PROXY_URL}/supplier_invoices?limit=8`, { headers }),
    ]);
    if (!invRes.ok) throw new Error('Erreur API ' + invRes.status);
    const invoices = (await invRes.json()).items || [];
    const suppliers = (await supRes.json()).items || [];

    document.getElementById('syncBadge').textContent = '\u25cf Pennylane synchronis\u00e9';
    document.getElementById('syncBadge').className = 'badge ok';

    const outstanding = invoices.filter(i=>i.status!=='paid');
    const late = invoices.filter(i=>i.status==='late');
    const totalOut = outstanding.reduce((s,i)=>s+parseFloat(i.amount),0);
    const totalLate = late.reduce((s,i)=>s+parseFloat(i.amount),0);
    const totalSup = suppliers.reduce((s,i)=>s+parseFloat(i.amount),0);

    document.getElementById('kpi1').innerHTML = `
      <div class="kpi-label">Factures clients en cours</div>
      <div class="kpi-value" style="color:var(--accent)">${fmt(totalOut)}</div>
      <div class="kpi-sub">${outstanding.length} facture${outstanding.length>1?'s':''} \u00e0 encaisser</div>
      <div class="kpi-bar" style="background:var(--accent);opacity:.3"></div>`;
    document.getElementById('kpi2').innerHTML = `
      <div class="kpi-label">Factures en retard</div>
      <div class="kpi-value" style="color:${late.length>0?'var(--danger)':'var(--accent)'}">${fmt(totalLate)}</div>
      <div class="kpi-sub">${late.length} facture${late.length!==1?'s':''} en retard</div>
      <div class="kpi-bar" style="background:var(--danger);opacity:.3"></div>`;
    document.getElementById('kpi3').innerHTML = `
      <div class="kpi-label">Charges fournisseurs (30j)</div>
      <div class="kpi-value" style="color:var(--warn)">${fmt(totalSup)}</div>
      <div class="kpi-sub">${suppliers.length} factures fournisseurs</div>
      <div class="kpi-bar" style="background:var(--warn);opacity:.3"></div>`;

    const az = document.getElementById('alertsZone');
    az.innerHTML = '';
    late.forEach(inv => {
      az.innerHTML += `<div class="alert danger"><div>
        <strong>${inv.invoice_number} \u2014 ${fmt(inv.amount)} en retard</strong>
        <span>\u00c9ch\u00e9ance d\u00e9pass\u00e9e depuis ${daysFrom(inv.deadline)} jour${daysFrom(inv.deadline)>1?'s':''}. Relance recommand\u00e9e.</span>
      </div></div>`;
    });

    document.getElementById('invSub').textContent = `${invoices.length} factures \u00b7 Pennylane`;
    const il = document.getElementById('invList');
    il.innerHTML = invoices.length===0?'<div class="empty">Aucune facture</div>':'';
    invoices.slice(0,7).forEach(inv => {
      const paid = inv.status==='paid';
      il.innerHTML += `<div class="flux-item">
        <div class="flux-left">
          <div class="flux-icon" style="background:${paid?'rgba(74,222,128,.1)':'rgba(248,113,113,.1)'}">${paid?'\ud83d\udce5':'\ud83d\udcc4'}</div>
          <div>
            <div class="flux-name">${inv.invoice_number}${statusTag(inv)}</div>
            <div class="flux-date">${shortDate(inv.date)} \u00b7 \u00e9ch. ${shortDate(inv.deadline)}</div>
          </div>
        </div>
        <div class="flux-amount ${paid?'positive':inv.status==='late'?'late-color':''}">${fmt(inv.amount)}</div>
      </div>`;
    });

    document.getElementById('supSub').textContent = `${suppliers.length} factures \u00b7 Pennylane`;
    const sl = document.getElementById('supList');
    sl.innerHTML = suppliers.length===0?'<div class="empty">Aucune charge</div>':'';
    suppliers.slice(0,7).forEach(sup => {
      sl.innerHTML += `<div class="flux-item">
        <div class="flux-left">
          <div class="flux-icon" style="background:rgba(251,191,36,.08)">\ud83d\uddd2</div>
          <div>
            <div class="flux-name">${sup.invoice_number||'Facture'}</div>
            <div class="flux-date">${shortDate(sup.date)}</div>
          </div>
        </div>
        <div class="flux-amount negative">\u2212${fmt(sup.amount)}</div>
      </div>`;
    });

    if (late.length>0) {
      document.getElementById('questionZone').innerHTML = `<div class="qbubble">
        <div class="qb-icon">\ud83e\udd14</div>
        <div class="qb-text">
          <p>Tu as <strong>${late.length} facture${late.length>1?'s':''} en retard</strong> (${fmt(totalLate)}). Tu as d\u00e9j\u00e0 envoy\u00e9 une relance ?</p>
          <div class="qb-actions">
            <button class="qb-btn qb-yes" onclick="this.closest('.qbubble').remove()">Oui, relance envoy\u00e9e</button>
            <button class="qb-btn qb-no" onclick="this.closest('.qbubble').remove()">Je le fais maintenant</button>
          </div>
        </div>
      </div>`;
    }
  } catch(e) {
    document.getElementById('syncBadge').textContent = '\u2717 Erreur de connexion';
    document.getElementById('syncBadge').className = 'badge err';
    document.getElementById('alertsZone').innerHTML = `<div class="alert danger"><div><strong>Impossible de contacter Pennylane</strong><span>${e.message}</span></div></div>`;
  }
}
</script>
</body>
</html>
